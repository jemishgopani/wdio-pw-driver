name: Deploy docs

# Build the Docusaurus site under `website/` and publish it to GitHub Pages.
# Uses the modern Pages-from-Actions flow — no `gh-pages` branch required.
# One-time repo setup: Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

# Pages is a single deploy slot. Cancel any in-flight deploy when a newer
# commit arrives so we don't ship stale content over fresh.
concurrency:
  group: pages
  cancel-in-progress: true

# Required by actions/deploy-pages — id-token for OIDC, pages: write so the
# action can publish.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages on first run instead of requiring a manual
          # Settings → Pages → Source = GitHub Actions toggle. Needs the
          # `pages: write` permission already granted at the workflow
          # level.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
