name: CodeQL

# GitHub's static-analysis scanner. Catches injection-style bugs,
# unsafe regex, hardcoded secrets, taint flow into eval/spawn, etc.
# Free for public repos; results land in repo Security → Code scanning.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'bin/**'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'bin/**'
  schedule:
    # Weekly cron catches CVEs in queries shipped after our last push.
    - cron: '0 4 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # security-and-quality includes the security-extended pack
          # plus code-quality (complexity, dead code) heuristics.
          queries: security-and-quality

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
